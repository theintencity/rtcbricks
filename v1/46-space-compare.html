<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
        <script src="https://rawcdn.githack.com/mrdoob/three.js/r132/build/three.min.js"></script>
        <script src="https://rawcdn.githack.com/mrdoob/three.js/r132/examples/js/controls/OrbitControls.js"></script>

        <script type="text/javascript" src="video-io.js"></script>
        <script type="text/javascript" src="threejs-space.js"></script>
        <script type="text/javascript" src="virtual-space.js"></script>

        <style type="text/css">
            body { margin: 0; padding: 0; display: flex; flex-flow: row nowrap; position: absolute; width: 100%; height: 100%; }
            body > * { position: relative; flex: 1; width: 50%; }
            virtual-space:after {
                content: "virtual-space";
                position: absolute; top: 0px; left: 0px; 
                color: white;
            }
            threejs-space:after {
                content: "threejs-space";
                position: absolute; top: 0px; left: 0px;
                color: white;
            }
        </style>

	</head>
	<body>
        <virtual-space stars bgstars>
            <div ondblclick="event.currentTarget.setAttribute('selected', '');"
                style="background-color: white; border-radius: 15px; width: 30px; height: 30px;"
                position3d="x:0,y:0,z:0"></div>
            <img src="46-image-1.jpeg"
                ondblclick="event.currentTarget.setAttribute('selected', '');"
                style="width: 1000px; height: 700px;"
                position3d="x:200,y:-400,z:0,rx:-30,ry:-30"></video-io>
            <img src="46-image2.jpeg"
                ondblclick="event.currentTarget.setAttribute('selected', '');"
                style="width: 400px; height: 400px;"
                position3d="x:-650,y:200,ry:45" />
            <img src="46-image3.jpeg"
                ondblclick="event.currentTarget.setAttribute('selected', '');"
                style="width: 400px; height: 400px;"
                position3d="x:-1000,y:200,z:100,ry:-35" />
        </virtual-space>

        <threejs-space font="https://rawcdn.githack.com/mrdoob/three.js/r132/examples/fonts/helvetiker_regular.typeface.json" 
            camera3d="x:-100,y:10,z:300" target3d="x:0,y:50,z:0">
            <img src="46-image-1.jpeg"
                displayname="Ice Queen"
                position3d="shape:rectangle,w:240,h:180,x:150,y:100,z:-100,ry:-45deg"></video-io>
            <img src="46-image2.jpeg"
                displayname="Aana"
                position3d="shape:cube,side:30,x:-50,y:15,z:0" />
            <img src="46-image3.jpeg"
                displayname="Kristoff"
                position3d="shape:cube,side:30,x:0,y:15,z:0" />
        </threejs-space>

	</body>
</html>
