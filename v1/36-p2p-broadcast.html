<!doctype html>
<html>
<head>
    <script type="text/javascript" src="video-io.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
        html, body, div.content {
            position: absolute; 
            left: 0px; top: 0px; width: 100%; height: 100%; 
            padding: 0; margin: 0;
        }
        canvas.background {
            position: absolute; left: 0px; top: 0px;
        }
        video-io::after {
            content: attr("name");
            position: absolute; left: 0px; top: 0px; 
            font-size: 40px; color: white; text-shadow: 0 0 40px #000000;
        }
    </style>
</head>
<body>
    <canvas class="background"></canvas>
    <div class="content"></div>
    <script type="text/javascript">
        const content = document.querySelector("div.content");

        const N = 7;
        for (let index=0; index<N; ++index) {
            let pstream, pvideo;
            if (index > 0) {
                let pindex = Math.floor((index-1)/2);
                pstream = document.querySelector('named-stream[index="' + pindex + '"]');
                pvideo = document.createElement("video-io");
                pvideo.setAttribute("name", "subscribe " + pindex);
                pvideo.style.display = "none";
                content.appendChild(pvideo);
                pvideo.controls = true;
                pvideo.srcObject = pstream;
                pvideo.subscribe = true;
            }

            let stream = document.createElement("named-stream");
            stream.setAttribute("index", "" + index);
            document.body.appendChild(stream);
            let video = document.createElement("video-io");
            video.setAttribute("name", "publish " + index);
            video.style.display = "none";
            content.appendChild(video);
            video.controls = video.autoenable = true
            // TODO: does not work correctly when cam is muted/unmuted if no keeptracks.
            video.keeptracks = true;
            if (index > 0) {
                video.input = pvideo;
            } else {
                video.microphone = false;
            }
            video.srcObject = stream;
            video.publish = true;
        }

        const w = 160, h = 120; // width and height

        function position(index) {
            let yi = Math.floor(Math.log2(index+1));
            let xn = Math.pow(2, yi);
            let xi = index > 0 ? (index - (xn-1)) : 0;
            let y = yi * 150 + h/2 + 20;
            let x = ((window.innerWidth - 40) / xn) * (xi + 0.5) + 20;
            return {x: x, y: y};
        }

        setTimeout(function() {
            const canvas = document.querySelector("canvas.background");
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext("2d");

            for (let index=0; index<N; ++index) {

                const {x, y} = position(index);
                if (index > 0) {
                    let pindex = Math.floor((index-1)/2);
                    const p = position(pindex);
                    ctx.strokeStyle = "rgba(0,0,0,0.5)";
                    ctx.lineWidth = 6;
                    ctx.beginPath();       // Start a new path
                    ctx.moveTo(p.x, p.y);    // Move the pen to (30, 50)
                    ctx.lineTo(x, y);  // Draw a line to (150, 100)
                    ctx.stroke();          // Render the path
                    console.log("line " + p.x + "," + p.y + " " + x + "," + y);
                }

                const video = document.querySelector('video-io[name="publish ' + index + '"]');
                video.setAttribute("style", "position: absolute; width: " 
                    + w + "px; height: " + h + "px; left: " + (x-w/2) + "px; top: " 
                    + (y-h/2) + "px;");
            }
        }, 1000);


    </script>
</body>
</html>
