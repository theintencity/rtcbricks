<!doctype html>
<html>
<head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />

    <!-- https://github.com/taufik-nurrohman/rich-text-editor -->
    <link rel="stylesheet" type="text/css" href="rich-text-editor.css">
    <script type="text/javascript" src="rich-text-editor.js"></script>

    <script type="text/javascript" src="restserver-storage.js"></script>
    <script type="text/javascript" src="shared-storage.js"></script>
    <script type="text/javascript" src="shared-editor.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />

    <style type="text/css">
        body {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-flow: row nowrap; align-items: stretch;
        }
        shared-editor {
            position: relative; flex: 1; margin: 1ch;
        }
    </style>
</head>
<body>
    <shared-storage id="storage" src="local"></shared-storage>
    <shared-editor-data id="data1" for-storage="storage" self="alice" path="sessions/edit123"></shared-editor-data>
    <shared-editor for-data="data1" label="Alice"></shared-editor>
    <shared-editor-data id="data2" for-storage="storage" self="bob" path="sessions/edit123"></shared-editor-data>
    <shared-editor for-data="data2" label="Bob"></shared-editor>
    <!--
    <shared-editor for-storage="storage" self="carol" path="sessions/edit123"></shared-editor>
    -->
    <script type="text/javascript">
        document.querySelector("shared-storage")._impl.console = { log: () => {} }; // { console.log(...args); } };
        // setTimeout(() => {
        //     const editor = document.createElement("shared-editor");
        //     editor.self = "carol";
        //     editor.path = "sessions/edit123";
        //     editor.label = "Carol";
        //     editor.storage = document.querySelector("shared-storage");
        //     document.body.appendChild(editor);
        // }, 15000);

        document.querySelector("shared-editor").content = `<p><span style="font-size: 200%; font-family: arial, sans-serif;">Heading</span></p>\n\n<p>A text can include <strong>bold</strong>, <em>italic</em>, <u>underline</u>,<br>\n<code>code&nbsp;fragments</code>, or links <a href="http://something" rel="nofollow" target="_blank">http://something</a>.</p>\n\n<p>Text can have <span style="color: red;">color</span> or <span style="background-color: lightblue;">background color</span></p>\n\n<p>Finally locking, upload, download and<br>\nsource editing are available. You can include<br>\nimages too.<br>\n</p>`;
    </script>
</body>
</html>
