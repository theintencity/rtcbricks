<!doctype html>
<html>
<head>
    <script type="text/javascript" src="log-level.js"></script>
    <script type="text/javascript" src="video-io.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
        div.table {
            display: table;
        }
        div.table > div {
            display: table-row;
        }
        div.table > div > div {
            display: table-cell;
            padding: 1ch;
        }
    </style>
</head>
<body>
    <div class="table">
        <div>
            <div><video-io id="video1" controls autoenable="true" microphone="false"></video-io></div>
            <div><video-io id="video2" controls></video-io></div>
            <div><video-io id="video3" controls></video-io></div>
        </div>
        <div>
            <div><button id="button1">publish</button></div>
            <div><button id="button2">subscribe</button></div>
            <div><button id="button3">subscribe</button></div>
        </div>
    </div>
    <named-stream id="stream"></named-stream>
    <script type="text/javascript">
        const [video1, video2, video3, stream, button1, button2, button3] = 
            ["video1", "video2", "video3", "stream", "button1", "button2", "button3"]
            .map(id => document.getElementById(id));

        video1.srcObject = video2.srcObject = video3.srcObject = stream;

        button1.onclick = button2.onclick = button3.onclick = e => {
            let button = e.currentTarget;
            let video = document.querySelector(button.id.replace(/button/, '#video'));
            if (button.innerText == "stop") {
                if (button.id == "button1") {
                    button.innerText = "publish";
                    video.publish = false;
                } else {
                    button.innerText = "subscribe";
                    video.subscribe = false;
                }
            } else {
                button.innerText = "stop";
                if (button.id == "button1") {
                    video.publish = true;
                } else {
                    video.subscribe = true;
                }
            }
        };
    </script>
</body>
</html>
