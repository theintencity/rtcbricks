<!doctype html>
<html>
<head>
    <script type="text/javascript" src="log-level.js"></script>
    <script type="text/javascript" src="shared-storage.js"></script>
    <script type="text/javascript" src="peer-storage.js"></script>
    <script type="text/javascript" src="text-chat.js"></script>
    <script type="text/javascript" src="web-assets.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
        body {
            position: absolute; width: 100%; height: 100%;
        }
        text-chat {
            width: 300px; height: 400px; max-height: 100%;
            display: inline-block;
            border: solid 1px lightgrey;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <alert-sounds id="sounds"></alert-sounds>
    <yahoo-smileys id="smileys"></yahoo-smileys>
    <shared-storage id="storage1"></shared-storage>
    <shared-storage id="storage2"></shared-storage>
    <text-feed-data id="data1" for-storage="storage1" self="alice" displayname="Alice" path="sessions/chat123"></text-feed-data>
    <text-feed-data id="data2" for-storage="storage2" self="bob" displayname="Bob" path="sessions/chat123"></text-feed-data>

    <text-chat for-data="data1">
        <text-feed for-smileys="smileys" for-sounds="sounds"></text-feed>
    </text-chat>
    <text-chat for-data="data2">
        <text-feed for-smileys="smileys" for-sounds="sounds"></text-feed>
    </text-chat>

    <script type="text/javascript">

const storage1 = document.querySelector("#storage1");
const storage2 = document.querySelector("#storage2");
PeerNetworkImpl.connectall("fullmesh", storage1, storage2).catch((error) => console.warn(error));

    </script>
</body>
</html>
