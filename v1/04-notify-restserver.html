<!doctype html>
<html>
<head>
    <script type="text/javascript" src="log-level.js"></script>
    <script type="text/javascript" src="video-io.js"></script>
    <script type="text/javascript" src="shared-storage.js"></script>
    <script type="text/javascript" src="restserver-storage.js"></script>
    <script type="text/javascript" src="storage-stream.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
    div.box {
        position: absolute;
        display: flex; flex-flow: column nowrap; justify-content: center;
        width: 320px;
    }
    video-io {
        position: relative; width: 320px; height: 240px;
        box-shadow: 0 0 1px 1px black;
    }
    button {
        position: relative; margin-top: 10px;
        align-self: center;
    }
    div.box.first {
        top: 150px; left: 10px;
    }
    div.box.second {
        top: 10px; left: 450px;
    }
    div.box.third {
        top: 300px; left: 450px;
    }
    svg {
        position: absolute;
    }
    svg.arrow.second {
        left: 340px; top: 150px;
    }
    svg.arrow.third {
        left: 340px; top: 300px;
    }
    </style>
</head>
<body>
    <!-- use separate storage instances, because implementation uses sa.list() and sa.object(). -->

    <shared-storage id="storage1" src="ws://localhost:8080/restserver"></shared-storage>
    <shared-storage id="storage2" src="ws://localhost:8080/restserver"></shared-storage>
    <shared-storage id="storage3" src="ws://localhost:8080/restserver"></shared-storage>

    <storage-stream id="stream1" for-storage="storage1" path="stream/1234"></storage-stream>
    <storage-stream id="stream2" for-storage="storage2" path="stream/1234"></storage-stream>
    <storage-stream id="stream3" for-storage="storage3" path="stream/1234"></storage-stream>

    <svg class="arrow second" width="100" height="100">
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                <path d="M0,5 L0,0 L10,5 L0,10 L0,5" style="fill:black;" />
            </marker>
        </defs>
        <path d="M0,100 L100,0" style="stroke:black; stroke-width: 1.25px; fill: none; marker-end: url(#arrow);"
        />
    </svg>
    <svg class="arrow third" width="100" height="100">
        <path d="M0,0 L100,100" style="stroke:black; stroke-width: 1.25px; fill: none; marker-end: url(#arrow);"
        />
    </svg>
    <div class="box first">
        <video-io id="video1" controls autoenable="true" for="stream1" publish="true"></video-io>
        <button id="button1">stop</button>
    </div>
    <div class="box second">
        <video-io id="video2" controls for="stream2" subscribe="true"></video-io>
        <button id="button2">stop</button>
    </div>
    <div class="box third">
        <video-io id="video3" controls for="stream3" subscribe="true"></video-io>
        <button id="button3">stop</button>
    </div>
    <script type="text/javascript">
        //document.querySelector("shared-storage")._impl.console = { log: (...args) => { console.log(...args); } };

        const [video1, video2, video3, button1, button2, button3] = 
              ["video1", "video2", "video3", "button1", "button2", "button3"]
              .map(id => document.getElementById(id));

        button1.onclick = button2.onclick = button3.onclick = e => {
            const button = e.currentTarget;
            const video = document.querySelector(button.id.replace(/button/, '#video'));
            if (button.innerText == "stop") {
                if (button.id == "button1") {
                    button.innerText = "publish";
                    video.publish = false;
                } else {
                    button.innerText = "subscribe";
                    video.subscribe = false;
                }
            } else {
                button.innerText = "stop";
                if (button.id == "button1") {
                    video.publish = true;
                } else {
                    video.subscribe = true;
                }
            }
        };
    </script>
</body>
</html>
