<!doctype html>
<html>
<head>
    <script type="text/javascript" src="flex-box.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
body {
    position: absolute; width: 100%; height: 100%;
    display: flex; flex-flow: row wrap; justify-content: center;
    align-content: space-evenly; justify-content: space-evenly;
}
flex-box {
    position: relative; 
    background-color: black;
    box-shadow: 0 0 4px 1px rgba(0,0,0,0.6);
}
flex-box:before {
    content: attr(display);
    position: absolute; color: grey; z-index: 1; left: 2px; top: 2px;
}
div { 
    color: black; background-color: white;
    border: solid 1px black; box-sizing: border-box;
    display: flex; justify-content: center; align-items: center;
    font-family: sans-serif; font-size: 0.8rem;
    user-select: none;
}
    </style>
</head>
<body>
    <flex-box display="inline-block"></flex-box>
    <flex-box display="grid"></flex-box>
    <flex-box display="flex"></flex-box>
    <flex-box display="page"></flex-box>
    <flex-box display="pip"></flex-box>

    <script type="text/javascript">
const items = "Hhhvhvvhhvhh".split(""); // 20 items.
const sizes = ["320x240", "320x180", "240x240", "150x300", "320x180"];
let count = 0, dir = 1, index = 0, sindex = 0, iteration = 0;
setInterval(() => {
    //const mode = (count == 0 || Math.random() < 0.7) ? "count": "size";
    const mode = (count == 0 || iteration % 7 != 0) ? "count" : "size";
    if (mode == "count") {
        if (dir == 1 && count >= items.length) {
            dir = -1;
        } else if (dir == -1 && count <= 1) {
            dir = 1;
        }
        if (dir > 0) {
            const type = items[count];
            count += dir;
            append_item(type, count);
        } else {
            count += dir;
            remove_item_at(count);
        }
    } else if (mode == "size") {
        sindex = (sindex + 1) % sizes.length;
        set_size(sizes[sindex]);
    }
    iteration ++;
}, 2000);

function append_item(type, index) {
    [].slice.call(document.querySelectorAll("flex-box")).forEach(flexbox => {
        const div = document.createElement("div");
        div.innerText = "" + index;
        const attrs = type.toLowerCase() == "v" ? 
            {width: 180, height: 320, "min-ratio": "9:16", "max-ratio": "1:1"} :
            {width: 320, height: 180, "min-ratio": "1:1", "max-ratio": "16:9"}; 
        if (type.toUpperCase() == type) {
            attrs.float = "";
        }
        for (let name in attrs) {
            div.setAttribute(name, attrs[name]);
        }
        flexbox.appendChild(div);
    });
}

function remove_item_at(index) {
    [].slice.call(document.querySelectorAll("flex-box")).forEach(flexbox => {
        const child = flexbox.children[index];
        if (child) {
            flexbox.removeChild(child);
        }
    });
}

function set_size(size) {
    const [width, height] = size.split('x').map(str => parseInt(str));
    [].slice.call(document.querySelectorAll("flex-box")).forEach(flexbox => {
        flexbox.style.width = width + 'px';
        flexbox.style.height = height + 'px';
        // flexbox.setAttribute("transition", "none");
        // setTimeout(() => {
        //     flexbox.style.width = width + 'px';
        //     flexbox.style.height = height + 'px';
        //     setTimeout(() => {
        //         flexbox.removeAttribute("transition");
        //     }, 100);
        // }, 100);
    });
}

set_size(sizes[0]);
items.slice(0, 3).forEach((type, index) => {
    count++; 
    iteration ++;
    append_item(type, index+1);
});
    </script>
</body>
</html>
