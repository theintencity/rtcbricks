<!doctype html>
<html>
<head>
    <script type="text/javascript" src="log-level.js"></script>
    <script type="text/javascript" src="video-io.js"></script>
    <script type="text/javascript" src="shared-storage.js"></script>
    <script type="text/javascript" src="text-chat.js"></script>
    <script type="text/javascript" src="text-chat-bubbles.js"></script>
    <script type="text/javascript" src="user-roster.js"></script>
    <script type="text/javascript" src="media-chat.js"></script>
    <script type="text/javascript" src="flex-box.js"></script>
    <script type="text/javascript" src="web-assets.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
        body {
            display: flex; flex-flow: row wrap;
            justify-content: flex-start;
        }
        body > * {
            position: relative;
            flex: 0 0 auto;
        }
        media-chat {
            width: 200px; height: 400px;
            display: inline-block;
            border: solid 1px lightgrey;
            margin: 10px;
            resize: both;
        }
        media-chat[display="hangout"] {
            width: 600px; height: 400px;
        }
        media-chat[display="videocity"] {
            width: 480px; height: 300px;
        }
        video-io > span {
            color: rgba(255,255,255,0.8); 
            font-size: 10px; font-family: sans-serif;
            text-shadow: 0 0 1px rgba(0,0,0,0.8);
        }
        text-feed {
            font-size: 12px; line-height: 16px;
        }

        media-chat:nth-of-type(3) overlay-menu {
            background-color: black;
            color: white;
        }
        media-chat:nth-of-type(3) overlay-menu > span:hover {
            background-color: #666;
        }
        /* media-chat:nth-of-type(3)::part(button-audio) {
            background-image: url(53-cellphone.png);
        }
        media-chat:nth-of-type(3)::part(button-video) {
            background-image: url(53-video-icon.png);
        } */
    </style>
</head>
<body>
    <alert-sounds id="sounds"></alert-sounds>
    <yahoo-smileys id="smileys"></yahoo-smileys>
    <shared-storage id="storage1" src="local"></shared-storage>
    <shared-storage id="storage2" src="local"></shared-storage>
    <shared-storage id="storage3" src="local"></shared-storage>
    <shared-storage id="storage4" src="local"></shared-storage>

    <media-chat-data id="data1" for-storage="storage1" self="alice" displayname="Alice" path="sessions/conf123"></media-chat-data>
    <media-chat for-data="data1" display="hangout" showbuttons="float">
        <toolbar-buttons slot="buttons">
            <span>Weekly status sync</span>
            <button name="audio" toggle title="start/stop an audio call" show-if="calltype!='video'"></button>
            <button name="video" toggle title="start/stop a video call" show-if="calltype!='audio'"></button>
            <button name="menu" title="more actions"></button>
        </toolbar-buttons>
        <overlay-menu slot="menu">
            <span name="microphone" toggle="true" checked="true">Microphone</span>
            <span name="camera" toggle="true" checked="true">Webcam</span>
            <span name="screenshare" toggle show-if="calltype!='none'">Share screen</span>
            <span name="clear">Clear text chat</span>
            <span name="popout" show-if="!popout && calltype!='none'">Popout videos</span>
            <span name="fullscreen" toggle>Full screen</span>
        </overlay-menu>
        <user-roster slot="roster"></user-roster>
        <text-chat slot="chat">
            <text-feed for-smileys="smileys" for-sounds="sounds"></text-feed>
        </text-chat>
        <flex-box slot="videos" disallow="dragmove"></flex-box>
    </media-chat>
    <media-chat-data id="data2" for-storage="storage2" self="bob" displayname="Bob" path="sessions/conf123"></media-chat-data>
    <media-chat for-data="data2" videos-ratio="1.333" display="filmstrip">
        <toolbar-buttons slot="buttons">
            <span name="topic">Weekly status sync</span>
            <button name="video" toggle title="start/stop a video call"></button>
            <button name="flip" title="flip to show videos"></button>
            <button name="menu" title="more actions"></button>
        </toolbar-buttons>
        <overlay-menu slot="menu">
            <span name="microphone" toggle="true" checked="true">Microphone</span>
            <span name="camera" toggle="true" checked="true">Webcam</span>
            <span name="screenshare" toggle show-if="calltype!='none'">Share screen</span>
            <span name="clear">Clear text chat</span>
        </overlay-menu>
        <flex-box slot="videos" disallow="dragmove,dblclick" restore-display></flex-box>
        <user-roster slot="roster"></user-roster>
        <text-chat slot="chat" showtyping="true">
            <text-feed for-smileys="smileys" for-sounds="sounds"></text-feed>
        </text-chat>
    </media-chat>
    <media-chat-data id="data3" for-storage="storage3" self="carol" displayname="Carol" path="sessions/conf123"></media-chat-data>
    <media-chat for-data="data3" display="messenger">
        <toolbar-buttons slot="buttons">
            <span>Weekly status sync</span>
            <button name="audio" toggle title="start/stop an audio call" show-if="calltype!='video'"></button>
            <button name="video" toggle title="start/stop a video call" show-if="calltype!='audio'"></button>
            <button name="menu" title="more actions"></button>
        </toolbar-buttons>
        <overlay-menu slot="menu">
            <span name="microphone" toggle="true" checked="true">Microphone</span>
            <span name="camera" toggle="true" checked="true">Webcam</span>
            <span name="screenshare" toggle show-if="calltype=='video'">Share screen</span>
            <span name="clear">Clear text chat</span>
            <span name="popout" show-if="!popout && calltype=='video'">Popout videos</span>
        </overlay-menu>
        <flex-box slot="videos" disallow="dragmove"></flex-box>
        <text-chat slot="chat" input="false">
            <text-feed-bubbles input="true" showtyping="true"></text-feed-bubbles>
        </text-chat>
        <user-roster slot="roster"></user-roster>
    </media-chat>
    <media-chat-data id="data4" for-storage="storage4" self="dave" displayname="Dave" path="sessions/conf123"></media-chat-data>
    <media-chat for-data="data4" display="videocity" showbuttons="bottom" speakerlevel="true">
        <toolbar-buttons slot="buttons">
            <button name="roster" toggle title="show/hide user roster"></button>
            <button name="chat" toggle title="show/hide text chat"></button>
            <button name="video" toggle title="start/stop a video call"></button>
            <button name="camera" toggle selected title="toggle webcam"></button>
            <button name="microphone" toggle selected title="toggle microphone"></button>
            <volume-level name="miclevel" title="adjust microphone volume" show-if="selfvideo==true"></volume-level>
            <button name="screenshare" toggle title="share screen or window"></button>
            <span name="topic">Weekly status sync</span>
            <volume-level name="soundlevel" title="adjust speaker volume" show-if="othervideos==true"></volume-level>
            <button name="sound" toggle selected title="toggle speaker sound"></button>
            <button name="settings" title="device selection"></button>
            <button name="layout" title="change layout"></button>
            <button name="fullscreen" toggle title="toggle fullscreen"></button>
        </toolbar-buttons>
        <flex-box slot="videos" disallow="dragmove"></flex-box>
        <text-chat slot="chat" input="false" minsize="100x200">
            <text-feed-bubbles input="true" showtyping="true"></text-feed-bubbles>
        </text-chat>
        <user-roster slot="roster"></user-roster>
    </media-chat>

    <script type="text/javascript">
        const streams = {};

        [].slice.call(document.querySelectorAll("media-chat")).forEach(item => {
            item.addEventListener("addvideo", event => {
                const {video, id} = event;
                // video.controls = true;
                let stream = streams[id];
                if (!stream) {
                    console.log("creating stream for " + id);
                    stream = streams[id] = document.createElement("named-stream");
                    stream._refcount = 1;
                } else {
                    stream._refcount += 1;
                }
                video.srcObject = stream;
            });

            item.addEventListener("removevideo", event => {
                const {video, id} = event;
                let stream = streams[id];
                if (stream) {
                    stream._refcount -= 1;
                    if (!stream._refcount) {
                        console.log("deleting stream for " + id);
                        delete streams[id];
                    }
                }
            });
        });
    </script>
</body>
</html>
