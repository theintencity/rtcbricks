<!doctype html>
<!--
$ sudo npm install -g gun-cli
$ gun -h
$ gun
-->
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script type="text/javascript" src="log-level.js"></script>
    <script type="text/javascript" src="video-io.js"></script>
    <script type="text/javascript" src="dbgun-stream.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />

    <style type="text/css">
        div.table {
            display: table;
        }
        div.table > div {
            display: table-row;
        }
        div.table > div > div {
            display: table-cell;
            padding: 1ch;
        }
    </style>
</head>

<body>
    <dbgun-stream id="stream1"></dbgun-stream>
    <script type="text/javascript">
        let stream = ("" + Math.random()).substring(2, 10); 
        // stream = "1234"; // or use 1234 for testing
        document.querySelector("dbgun-stream").src = "id:" + stream + "?config=" + encodeURIComponent(JSON.stringify({ 
            peers: [
                'http://localhost:8765/gun', //'http://gunjs.herokuapp.com/gun'
            ],
            localStorage: false, radisk: false,
        }));
    </script>
    <div class="table">
        <div>
            <div><video-io id="video1" controls autoenable="true" for="stream1"></video-io></div>
            <div><video-io id="video2" controls for="stream1"></video-io></div>
            <div><video-io id="video3" controls for="stream1"></video-io></div>
        </div>
        <div>
            <div><button id="button1">publish</button></div>
            <div><button id="button2">subscribe</button></div>
            <div><button id="button3">subscribe</button></div>
        </div>
    </div>
    <script type="text/javascript">
        const [video1, video2, video3, button1, button2, button3] = 
                ["video1", "video2", "video3", "button1", "button2", "button3"]
                .map(id => document.getElementById(id));

        button1.onclick = button2.onclick = button3.onclick = e => {
            const button = e.currentTarget;
            const video = document.querySelector(button.id.replace(/button/, '#video'));
            if (button.innerText == "stop") {
                if (button.id == "button1") {
                    button.innerText = "publish";
                    video.publish = false;
                } else {
                    button.innerText = "subscribe";
                    video.subscribe = false;
                }
            } else {
                button.innerText = "stop";
                if (button.id == "button1") {
                    video.publish = true;
                } else {
                    video.subscribe = true;
                }
            }
        };
    </script>
</body>
</html>
