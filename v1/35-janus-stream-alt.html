<!doctype html>
<html>
<head>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/9.0.3/adapter.min.js"></script>
    <script type="text/javascript" src="janus.js"></script>
    <script type="text/javascript" src="video-io.js"></script>
    <script type="text/javascript" src="janus-stream.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <style type="text/css">
    div.box {
        position: absolute;
        display: flex; flex-flow: column nowrap; justify-content: center;
        width: 320px;
    }
    video-io {
        position: relative; width: 320px; height: 240px;
        box-shadow: 0 0 1px 1px black;
    }
    button {
        position: relative; margin-top: 10px;
        align-self: center;
    }
    div.box.first {
        top: 150px; left: 10px;
    }
    div.box.second {
        top: 10px; left: 550px;
    }
    div.box.third {
        top: 300px; left: 550px;
    }
    svg {
        position: absolute;
    }
    svg.arrow.first {
        left: 340px; top: 225px;
    }
    svg.arrow.second {
        left: 440px; top: 150px;
    }
    svg.arrow.third {
        left: 440px; top: 300px;
    }
    </style>
</head>
<body>
    <janus-stream id="stream1" src="https://janus.conf.meetecho.com/janus?room=1234&feed=5678"></janus-stream>
    <janus-stream id="stream2" src="https://janus.conf.meetecho.com/janus?room=1234&feed=5678"></janus-stream>
    <janus-stream id="stream3" src="https://janus.conf.meetecho.com/janus?room=1234&feed=5678"></janus-stream>
    <svg class="arrow first" width="100" height="100">
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                <path d="M0,5 L0,0 L10,5 L0,10 L0,5" style="fill:black;" />
            </marker>
        </defs>
        <path d="M0,50 L75,50" style="stroke:black; stroke-width: 1.25px; fill: none; marker-end: url(#arrow);" />
    </svg>
    <svg class="arrow second" width="100" height="100">
        <path d="M0,100 L100,0" style="stroke:black; stroke-width: 1.25px; fill: none; marker-end: url(#arrow);" />
    </svg>
    <svg class="arrow third" width="100" height="100">
        <path d="M0,0 L100,100" style="stroke:black; stroke-width: 1.25px; fill: none; marker-end: url(#arrow);" />
    </svg>
    <div class="box first">
        <video-io id="video1" controls autoenable="true" for="stream1"></video-io>
        <button id="button1">publish</button>
    </div>
    <div class="box second">
        <video-io id="video2" controls for="stream2"></video-io>
        <button id="button2">subscribe</button>
    </div>
    <div class="box third">
        <video-io id="video3" controls for="stream3"></video-io>
        <button id="button3">subscribe</button>
    </div>
    <script type="text/javascript">
        let video1 = document.querySelector("#video1");
        let video2 = document.querySelector("#video2");
        let video3 = document.querySelector("#video3");
        let stream1 = document.querySelector("#stream1");
        let stream2 = document.querySelector("#stream2");
        let stream3 = document.querySelector("#stream3");
        let button1 = document.querySelector("#button1");
        let button2 = document.querySelector("#button2");
        let button3 = document.querySelector("#button3");

        video1.srcObject = stream1;
        video2.srcObject = stream2;
        video3.srcObject = stream3;

        button1.onclick = button2.onclick = button3.onclick = e => {
            let button = e.currentTarget;
            let video = document.querySelector(button.id.replace(/button/, '#video'));
            if (button.innerText == "stop") {
                if (button.id == "button1") {
                    button.innerText = "publish";
                    video.publish = false;
                } else {
                    button.innerText = "subscribe";
                    video.subscribe = false;
                }
            } else {
                button.innerText = "stop";
                if (button.id == "button1") {
                    video.publish = true;
                } else {
                    video.subscribe = true;
                }
            }
        };
    </script>
</body>
</html>
