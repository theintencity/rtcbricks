<!doctype html><html><head><title>NativeElectron Access Codes</title><style type="text/css">body,html{width:100%;height:100%;box-sizing:border-box;margin:0}body{position:absolute;box-sizing:border-box;padding:0;padding-left:1ch;padding-right:1ch;font-family:sans-serif}table,tr{width:100%;border:none;padding:0;border-collapse:collapse;height:30px}th{background-color:#d0d0d0}td.origin{width:100%}td.accesscode{min-width:50px;outline:0}td.delete{min-width:30px;text-align:center}td.delete button{border:none;background:0 0;padding:0;margin:0;cursor:pointer;outline:0}table tbody tr:nth-child(even){background-color:#efefef}tr[dirty] td.delete button{color:green}</style></head><body><h2>Allow access from Web?</h2><table><thead><tr><th></th><th>Code</th><th>Origin</th></tr></thead><tbody></tbody></table><template id="table-row"><tr origin=""><td class="delete"><button>&#x2717;</button></td><td class="accesscode"contenteditable="true"></td><td class="origin"></td></tr></template><script type="text/javascript">async function onload(){console.log("keytar",keytar);const e=await keytar.findCredentials();e.sort();const n=document.querySelector("table > tbody");e.forEach(({account:e,password:t})=>{const r=document.getElementById("table-row").content.querySelector("tr").cloneNode(!0);r.setAttribute("origin",e),r.querySelector("td.origin").textContent=e,r.querySelector("td.accesscode").textContent=t,n.appendChild(r),r.querySelector("td.accesscode").oninput=e=>{r.hasAttribute("dirty")||(r.setAttribute("dirty",""),r.querySelector("td.delete button").innerHTML="&#x2713;")},r.querySelector("td.delete button").onclick=async e=>{if(r.hasAttribute("dirty")){r.removeAttribute("dirty"),r.querySelector("td.delete button").innerHTML="&#x2717;";try{var t=await keytar.setPassword(r.getAttribute("origin"),r.querySelector("td.accesscode").textContent);console.log("setPassword",t)}catch(e){console.warn("failed to setPassword",e)}}else try{var o=await keytar.deletePassword(r.getAttribute("origin"));console.log("deletePassword",o),n.removeChild(r)}catch(e){console.warn("failed to deletePassword",e)}}})}window.onload=onload().catch(e=>console.error(e))</script></body></html>
