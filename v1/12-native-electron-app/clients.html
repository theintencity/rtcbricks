.objects"),c=document.getElementById("table-row").content.querySelector("div.object").cloneNode(!0);c.setAttribute("proxy",o.id),c.querySelector("span.type").textContent=o.type,c.querySelector("span.type").setAttribute("title",o.id),c.querySelector("button").onclick=async e=>{i(t,o)},n.appendChild(c)}}function i(e,t){const o=l.querySelector(`tr[client="${e}"]`);if(o){const c=o.querySelector("td.objects");var n;c?(n=c.querySelector(`div[proxy="${t.id}"]`))?(c.removeChild(n),API.delWebObject(e,t.id)):console.log("no div",t.id):console.log("no td")}else console.log("no row",e)}e.forEach(e=>{o(e)}),API.onWebChange((e,t)=>{"addClient"===t.type?o(t):"delClient"===t.type?c(t.id):"addClientObject"===t.type?r(t.id,t.object):"delClientObject"===t.type?i(t.id,t.object):console.log("invalid type",t?.type)})}window.onload=onload().catch(e=>console.error(e))</script></body></html>
